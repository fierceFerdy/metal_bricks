    <script>
        document.getElementById('arrivalInput').addEventListener('keyup', function(){
            console.log('oy')
            var today = new Date();
            var dayCode = today.getDay();
            console.log(dayCode);
            if(dayCode == 0){
                
            }else if(dayCode == 1){
                document.getElementById('arrivalTimeMonday').innerHTML = document.getElementById('arrivalInput').textContent;
            }else if(dayCode == 2){
                document.getElementById('arrivalTimeTuesday').innerHTML = document.getElementById('arrivalInput').textContent;
            }else if(dayCode == 3){
                document.getElementById('arrivalTimeWednesday').innerHTML = document.getElementById('arrivalInput').textContent;
            }else if(dayCode == 4){
                document.getElementById('arrivalTimeThursday').innerHTML = document.getElementById('arrivalInput').textContent;
            }else if(dayCode == 5){
                document.getElementById('arrivalTimeFriday').innerHTML = document.getElementById('arrivalInput').textContent;
            }else if(dayCode == 6){
                document.getElementById('arrivalTimeSaturday').innerHTML = document.getElementById('arrivalInput').textContent;
            }

        })
    </script>
